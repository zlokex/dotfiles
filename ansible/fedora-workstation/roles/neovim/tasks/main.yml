---
# Neovim itself is installed via dnf_packages. lazy.nvim self-bootstraps
# on first run, and Mason installs LSPs/formatters into ~/.local/share/nvim.
# This role only ensures the compile toolchain Mason + treesitter need.
- name: Ensure neovim build dependencies
  become: true
  ansible.builtin.dnf:
    name:
      - gcc
      - gcc-c++
      - make
      - unzip
      - cmake
      - luarocks
    state: present

- name: Headless restore of lazy.nvim plugins from lazy-lock.json
  ansible.builtin.command: nvim --headless "+Lazy! restore" +qa
  changed_when: false
