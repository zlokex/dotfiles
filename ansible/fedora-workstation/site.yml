---
- name: Recreate workstation
  hosts: local
  gather_facts: true

  pre_tasks:
    - name: Confirm distro is Fedora
      ansible.builtin.assert:
        that: ansible_distribution == "Fedora"
        fail_msg: "This playbook only targets Fedora (detected {{ ansible_distribution }})."

  roles:
    - { role: copr,         tags: [copr, packages] }
    - { role: dnf_packages, tags: [dnf, packages] }
    - { role: flatpak,      tags: [flatpak, packages] }
    - { role: fonts,        tags: [fonts] }
    - { role: dotfiles,     tags: [dotfiles] }
    - { role: shell,        tags: [shell] }
    - { role: cargo_tools,  tags: [cargo] }
    - { role: go_tools,     tags: [go] }
    - { role: nvm,          tags: [nvm, node] }
    - { role: npm_packages, tags: [npm, node] }
    - { role: neovim,       tags: [neovim] }
    - { role: vim,          tags: [vim] }
    - { role: jetbrains,    tags: [jetbrains] }
    - { role: claude_code,  tags: [claude-code] }
    - { role: gnome,        tags: [gnome] }
    - { role: services,     tags: [services] }
