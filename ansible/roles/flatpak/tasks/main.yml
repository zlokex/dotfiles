---
- name: Install flatpak
  become: true
  ansible.builtin.dnf:
    name: flatpak
    state: present

- name: Add Flathub remote
  become: true
  community.general.flatpak_remote:
    name: flathub
    flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo
    state: present

- name: Install Flatpak apps
  become: true
  community.general.flatpak:
    name: "{{ item }}"
    state: present
    remote: flathub
  loop: "{{ flatpak_apps }}"
